<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <ul class="list-unstyled">
            <li>elemento 1</li>
            <li>elemento 2</li>
            <li>elemento 3</li>
            <li>elemento 4</li>
            <li>elemento 5</li>
            <li>elemento 6</li>
            <ul class="list-unstyled">
                <li>Sub Elemento 1</li>
                <li>Sub Elemento 2</li>
                <li>Sub Elemento 3</li>
            </ul>
        </ul>
        
        <ol class="list-inline">
            <li class="list-inline-item">elemento 1</li>
            <li class="list-inline-item">elemento 2</li>
            <li class="list-inline-item">elemento 3</li>
            <li class="list-inline-item">elemento 4</li>
            <li class="list-inline-item">elemento 5</li>
            <li class="list-inline-item">elemento 6</li>
        </ol>
    </div>
</body>
</html>
